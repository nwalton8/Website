<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Film Trivia Challenge | Noah Walton</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #0d0d0d;
            color: #e8e0d0;
            font-family: 'Georgia', 'Times New Roman', serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 20px;
        }

        #app-header {
            text-align: center;
            padding: 30px 20px 10px;
            width: 100%;
        }

        #app-header h1 {
            font-size: 2.2rem;
            color: #c8a951;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        #app-header p {
            color: #a09070;
            font-style: italic;
            margin-top: 8px;
            font-size: 0.95rem;
        }

        #back-link {
            display: inline-block;
            margin-top: 10px;
            color: #666;
            font-family: Arial, sans-serif;
            font-size: 0.8rem;
            text-decoration: none;
            letter-spacing: 1px;
        }

        #back-link:hover { color: #c8a951; }

        #game-container {
            width: 100%;
            max-width: 720px;
            margin: 30px auto;
        }

        /* Score bar */
        #score-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1a1a1a;
            border: 1px solid #2e2e2e;
            border-radius: 6px;
            padding: 14px 24px;
            margin-bottom: 20px;
            font-family: Arial, sans-serif;
        }

        .score-item { text-align: center; }
        .score-label { font-size: 0.72rem; color: #666; text-transform: uppercase; letter-spacing: 1px; }
        .score-value { font-size: 1.6rem; color: #c8a951; font-weight: bold; margin-top: 2px; }

        /* Category selector */
        #category-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
        }

        .cat-btn {
            background: #1a1a1a;
            border: 1px solid #333;
            color: #a09070;
            padding: 6px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-family: Arial, sans-serif;
            font-size: 0.82rem;
            letter-spacing: 0.5px;
            transition: all 0.2s;
        }

        .cat-btn:hover, .cat-btn.active {
            background: #c8a951;
            color: #000;
            border-color: #c8a951;
        }

        /* Question card */
        #question-card {
            background: #161616;
            border: 1px solid #2e2e2e;
            border-radius: 8px;
            padding: 28px 30px;
            margin-bottom: 20px;
            min-height: 160px;
        }

        #question-number {
            font-family: Arial, sans-serif;
            font-size: 0.75rem;
            color: #c8a951;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 14px;
        }

        #question-text {
            font-size: 1.15rem;
            line-height: 1.7;
            color: #e8e0d0;
        }

        #difficulty-badge {
            display: inline-block;
            font-family: Arial, sans-serif;
            font-size: 0.7rem;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
            padding: 2px 10px;
            border-radius: 3px;
            margin-bottom: 12px;
        }

        .diff-easy { background: #1a3a1a; color: #6abf6a; border: 1px solid #2e5e2e; }
        .diff-medium { background: #3a2a00; color: #c8a951; border: 1px solid #5e4a00; }
        .diff-hard { background: #3a0a0a; color: #c86060; border: 1px solid #6e2020; }

        /* Answer input */
        #answer-area {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }

        #answer-input {
            flex: 1;
            background: #1a1a1a;
            border: 2px solid #2e2e2e;
            border-radius: 6px;
            color: #e8e0d0;
            font-family: Georgia, serif;
            font-size: 1rem;
            padding: 12px 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        #answer-input:focus { border-color: #c8a951; }

        #submit-btn {
            background: #c8a951;
            border: none;
            border-radius: 6px;
            color: #000;
            cursor: pointer;
            font-family: Arial, sans-serif;
            font-size: 0.88rem;
            font-weight: bold;
            letter-spacing: 1px;
            padding: 12px 24px;
            text-transform: uppercase;
            transition: background 0.2s;
            white-space: nowrap;
        }

        #submit-btn:hover:not(:disabled) { background: #e8c97a; }
        #submit-btn:disabled { background: #444; color: #666; cursor: not-allowed; }

        /* Feedback box */
        #feedback-box {
            border-radius: 6px;
            padding: 18px 20px;
            margin-bottom: 16px;
            font-size: 0.95rem;
            line-height: 1.6;
            display: none;
        }

        #feedback-box.correct {
            background: #0d1f0d;
            border: 1px solid #2e5e2e;
            color: #8de88d;
            display: block;
        }

        #feedback-box.incorrect {
            background: #1f0d0d;
            border: 1px solid #5e2e2e;
            color: #e88d8d;
            display: block;
        }

        #feedback-box.loading {
            background: #1a1a1a;
            border: 1px solid #333;
            color: #a09070;
            display: block;
            font-style: italic;
        }

        .feedback-icon { font-size: 1.3rem; margin-right: 8px; }

        /* Buttons row */
        #buttons-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .action-btn {
            background: transparent;
            border: 1px solid #333;
            border-radius: 6px;
            color: #a09070;
            cursor: pointer;
            font-family: Arial, sans-serif;
            font-size: 0.82rem;
            letter-spacing: 0.5px;
            padding: 10px 20px;
            transition: all 0.2s;
        }

        .action-btn:hover {
            border-color: #c8a951;
            color: #c8a951;
        }

        .action-btn.primary {
            background: #1a1a1a;
            border-color: #c8a951;
            color: #c8a951;
        }

        /* Hint */
        #hint-text {
            font-family: Arial, sans-serif;
            font-size: 0.82rem;
            color: #666;
            font-style: italic;
            margin-top: 10px;
            display: none;
        }

        /* High score panel */
        #results-panel {
            background: #1a1a1a;
            border: 1px solid #c8a951;
            border-radius: 8px;
            padding: 30px;
            text-align: center;
            display: none;
        }

        #results-panel h2 { color: #c8a951; font-size: 1.5rem; margin-bottom: 10px; }
        #results-panel .big-score { font-size: 3rem; color: #e8e0d0; margin: 16px 0; }
        #results-panel p { color: #a09070; font-size: 0.95rem; margin-bottom: 20px; }
        #results-panel button {
            background: #c8a951;
            border: none;
            border-radius: 6px;
            color: #000;
            cursor: pointer;
            font-family: Arial, sans-serif;
            font-size: 0.9rem;
            font-weight: bold;
            padding: 12px 32px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Loading dots animation */
        @keyframes dotPulse {
            0%, 80%, 100% { opacity: 0.2; }
            40% { opacity: 1; }
        }

        .dot { display: inline-block; animation: dotPulse 1.4s infinite; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        #streak-notice {
            font-family: Arial, sans-serif;
            font-size: 0.8rem;
            color: #666;
            text-align: center;
            margin-top: 8px;
        }

        .streak-fire { color: #c8a951; }
    </style>
</head>
<body>

<div id="app-header">
    <h1>🎬 Film Trivia Challenge</h1>
    <p>Test your cinema knowledge — AI grades your answers</p>
    <a href="scratch.html" id="back-link">← Back to Film Page</a>
</div>

<div id="game-container">

    <!-- Score bar -->
    <div id="score-bar">
        <div class="score-item">
            <div class="score-label">Score</div>
            <div class="score-value" id="display-score">0</div>
        </div>
        <div class="score-item">
            <div class="score-label">Streak</div>
            <div class="score-value" id="display-streak">0🔥</div>
        </div>
        <div class="score-item">
            <div class="score-label">Question</div>
            <div class="score-value" id="display-question">1/10</div>
        </div>
        <div class="score-item">
            <div class="score-label">Correct</div>
            <div class="score-value" id="display-correct">0</div>
        </div>
    </div>

    <!-- Category chooser -->
    <div id="category-bar">
        <span style="font-family:Arial;font-size:0.78rem;color:#555;align-self:center;text-transform:uppercase;letter-spacing:1px;">Genre:</span>
        <button class="cat-btn active" data-cat="Mixed">🎬 Mixed</button>
        <button class="cat-btn" data-cat="Classics">🎞 Classics</button>
        <button class="cat-btn" data-cat="Directors">🎥 Directors</button>
        <button class="cat-btn" data-cat="Quotes">💬 Quotes</button>
        <button class="cat-btn" data-cat="Sci-Fi">🚀 Sci-Fi</button>
        <button class="cat-btn" data-cat="Horror">👻 Horror</button>
    </div>

    <!-- Question card -->
    <div id="question-card">
        <div id="difficulty-badge" class="diff-medium">Medium</div>
        <div id="question-number">Question 1 of 10</div>
        <div id="question-text">Loading your first question<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></div>
        <div id="hint-text"></div>
    </div>

    <!-- Answer input -->
    <div id="answer-area">
        <input type="text" id="answer-input" placeholder="Type your answer here..." autocomplete="off" />
        <button id="submit-btn" disabled>Submit</button>
    </div>

    <!-- Feedback -->
    <div id="feedback-box"></div>

    <!-- Buttons -->
    <div id="buttons-row">
        <button class="action-btn" id="hint-btn">💡 Hint</button>
        <button class="action-btn" id="skip-btn">⏭ Skip</button>
        <button class="action-btn primary" id="next-btn" style="display:none;">Next Question →</button>
    </div>
    <div id="streak-notice"></div>

    <!-- Results panel (shown after all 10 questions) -->
    <div id="results-panel">
        <h2>🏆 Game Over!</h2>
        <div class="big-score" id="final-score-display">0</div>
        <p id="final-message"></p>
        <button onclick="restartGame()">Play Again</button>
    </div>

</div>

<script>
    // ===== GAME STATE =====
    const TOTAL_QUESTIONS = 10;
    let state = {
        score: 0,
        streak: 0,
        questionNum: 1,
        correctCount: 0,
        currentQuestion: null,
        currentCategory: 'Mixed',
        answered: false,
        hintUsed: false,
        history: []
    };

    // ===== QUESTION BANK (fallback if API fails) =====
    const questionBank = {
        Mixed: [
            { q: "Who directed Schindler's List?", a: "Steven Spielberg", diff: "easy" },
            { q: "What 1994 film features a hitman and a philosophical discussion about foot massages?", a: "Pulp Fiction", diff: "medium" },
            { q: "In which film does a clownfish search for his son across the ocean?", a: "Finding Nemo", diff: "easy" },
            { q: "Who played the Joker in The Dark Knight?", a: "Heath Ledger", diff: "easy" },
            { q: "Which Best Picture winner was the first R-rated animated feature to win at the Oscars?", a: "American Beauty", diff: "hard" },
            { q: "Name the 2014 film in which a birdman actor struggles with his superhero past.", a: "Birdman", diff: "medium" },
            { q: "What Kubrick film ends with the line 'I think I've seen this film before'?", a: "Eyes Wide Shut", diff: "hard" },
            { q: "Which actress played Clarice Starling in The Silence of the Lambs?", a: "Jodie Foster", diff: "easy" },
            { q: "In Interstellar, what is the name of the robot companion?", a: "TARS", diff: "medium" },
            { q: "What 1960 Hitchcock film is famous for its shower scene?", a: "Psycho", diff: "easy" },
        ],
        Classics: [
            { q: "Who played Rick Blaine in Casablanca?", a: "Humphrey Bogart", diff: "easy" },
            { q: "What year was Citizen Kane released?", a: "1941", diff: "medium" },
            { q: "Which classic film features the line 'I'll make him an offer he can't refuse'?", a: "The Godfather", diff: "easy" },
            { q: "Who directed 2001: A Space Odyssey?", a: "Stanley Kubrick", diff: "easy" },
            { q: "In Sunset Boulevard, what is the name of the forgotten actress played by Gloria Swanson?", a: "Norma Desmond", diff: "medium" },
        ],
        Directors: [
            { q: "Which director is known for the Dollars Trilogy (A Fistful of Dollars, For a Few Dollars More, The Good the Bad and the Ugly)?", a: "Sergio Leone", diff: "medium" },
            { q: "Who directed the original Alien in 1979?", a: "Ridley Scott", diff: "medium" },
            { q: "Name the French New Wave director who made The 400 Blows.", a: "François Truffaut", diff: "hard" },
            { q: "Which director appears in almost all of his own films as a cameo?", a: "Alfred Hitchcock", diff: "easy" },
            { q: "Who directed Parasite, the first non-English film to win Best Picture?", a: "Bong Joon-ho", diff: "medium" },
        ],
        Quotes: [
            { q: "Complete this quote: 'You can't handle the ______!'", a: "truth", diff: "easy" },
            { q: "What film contains the line 'To infinity and beyond!'?", a: "Toy Story", diff: "easy" },
            { q: "Who says 'Elementary, my dear Watson' — and in which famous franchise?", a: "Sherlock Holmes", diff: "easy" },
            { q: "Complete: 'Life is like a box of chocolates, you never know what you're gonna ______.'", a: "get", diff: "easy" },
            { q: "What film features 'I am your father' as its most famous line?", a: "The Empire Strikes Back", diff: "easy" },
        ],
        "Sci-Fi": [
            { q: "What is the name of the AI in Ex Machina?", a: "Ava", diff: "medium" },
            { q: "In Blade Runner, what are human-like androids called?", a: "Replicants", diff: "medium" },
            { q: "Who plays Neo in The Matrix?", a: "Keanu Reeves", diff: "easy" },
            { q: "What planet does the film Arrival focus on communicating with alien visitors from?", a: "Earth / no planet — the aliens arrive on Earth", diff: "hard" },
            { q: "Name the 2013 film in which Sandra Bullock and George Clooney are stranded in space.", a: "Gravity", diff: "easy" },
        ],
        Horror: [
            { q: "What is the name of the hotel in The Shining?", a: "The Overlook Hotel", diff: "easy" },
            { q: "In Get Out, what is the Sunken Place?", a: "A hypnotic state/prison within one's own mind", diff: "medium" },
            { q: "What 1978 John Carpenter film launched Michael Myers?", a: "Halloween", diff: "easy" },
            { q: "Name the shark-hunting film that Steven Spielberg directed in 1975.", a: "Jaws", diff: "easy" },
            { q: "In Hereditary, what is the name of the demon the family unwittingly summons?", a: "Paimon", diff: "hard" },
        ]
    };

    let questionQueue = [];
    let currentQuestionIndex = 0;

    // ===== INIT =====
    window.addEventListener('DOMContentLoaded', () => {
        setupCategoryButtons();
        setupInputListener();
        startGame();
    });

    function setupCategoryButtons() {
        document.querySelectorAll('.cat-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                state.currentCategory = btn.dataset.cat;
            });
        });
    }

    function setupInputListener() {
        const input = document.getElementById('answer-input');
        input.addEventListener('input', () => {
            document.getElementById('submit-btn').disabled = input.value.trim().length === 0;
        });
        input.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !document.getElementById('submit-btn').disabled && !state.answered) {
                submitAnswer();
            }
        });

        document.getElementById('submit-btn').addEventListener('click', submitAnswer);
        document.getElementById('hint-btn').addEventListener('click', showHint);
        document.getElementById('skip-btn').addEventListener('click', skipQuestion);
        document.getElementById('next-btn').addEventListener('click', nextQuestion);
    }

    function startGame() {
        state.score = 0;
        state.streak = 0;
        state.questionNum = 1;
        state.correctCount = 0;
        state.history = [];
        currentQuestionIndex = 0;
        buildQuestionQueue();
        updateScoreBar();
        document.getElementById('results-panel').style.display = 'none';
        document.getElementById('question-card').style.display = 'block';
        document.getElementById('answer-area').style.display = 'flex';
        document.getElementById('buttons-row').style.display = 'flex';
        loadQuestion();
    }

    function buildQuestionQueue() {
        const cat = state.currentCategory;
        const pool = questionBank[cat] || questionBank['Mixed'];
        // Shuffle
        questionQueue = [...pool].sort(() => Math.random() - 0.5).slice(0, TOTAL_QUESTIONS);
        // Pad with mixed if not enough
        if (questionQueue.length < TOTAL_QUESTIONS) {
            const mixed = [...questionBank['Mixed']].sort(() => Math.random() - 0.5);
            while (questionQueue.length < TOTAL_QUESTIONS) {
                questionQueue.push(mixed[questionQueue.length % mixed.length]);
            }
        }
    }

    function loadQuestion() {
        state.answered = false;
        state.hintUsed = false;

        const q = questionQueue[currentQuestionIndex];
        state.currentQuestion = q;

        // UI reset
        document.getElementById('answer-input').value = '';
        document.getElementById('submit-btn').disabled = true;
        document.getElementById('answer-input').disabled = false;
        document.getElementById('feedback-box').style.display = 'none';
        document.getElementById('feedback-box').className = '';
        document.getElementById('hint-text').style.display = 'none';
        document.getElementById('hint-btn').disabled = false;
        document.getElementById('skip-btn').disabled = false;
        document.getElementById('next-btn').style.display = 'none';
        document.getElementById('streak-notice').textContent = '';

        // Difficulty badge
        const badge = document.getElementById('difficulty-badge');
        badge.textContent = q.diff.charAt(0).toUpperCase() + q.diff.slice(1);
        badge.className = 'diff-' + q.diff;

        document.getElementById('question-number').textContent = `Question ${state.questionNum} of ${TOTAL_QUESTIONS}`;
        document.getElementById('question-text').textContent = q.q;
        document.getElementById('answer-input').focus();
    }

    async function submitAnswer() {
        if (state.answered) return;

        const userAnswer = document.getElementById('answer-input').value.trim();
        if (!userAnswer) return;

        state.answered = true;
        document.getElementById('submit-btn').disabled = true;
        document.getElementById('answer-input').disabled = true;
        document.getElementById('hint-btn').disabled = true;
        document.getElementById('skip-btn').disabled = true;

        // Show loading
        const feedbackBox = document.getElementById('feedback-box');
        feedbackBox.className = 'loading';
        feedbackBox.innerHTML = `Checking your answer<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span>`;

        const q = state.currentQuestion;
        const isCorrect = await gradeWithAI(q.q, q.a, userAnswer);

        if (isCorrect) {
            const points = q.diff === 'easy' ? 10 : q.diff === 'medium' ? 20 : 30;
            const streakBonus = state.streak >= 3 ? 5 : 0;
            state.score += points + streakBonus;
            state.streak++;
            state.correctCount++;

            feedbackBox.className = 'correct';
            let msg = `<span class="feedback-icon">✅</span> <strong>Correct!</strong> +${points} points`;
            if (streakBonus > 0) msg += ` <strong>(+${streakBonus} streak bonus!)</strong>`;
            msg += `<br><small style="opacity:0.7">The answer was: ${q.a}</small>`;
            feedbackBox.innerHTML = msg;

            if (state.streak >= 3) {
                document.getElementById('streak-notice').innerHTML = `<span class="streak-fire">🔥 ${state.streak} in a row!</span>`;
            }
        } else {
            state.streak = 0;
            feedbackBox.className = 'incorrect';
            feedbackBox.innerHTML = `<span class="feedback-icon">❌</span> <strong>Not quite.</strong><br><small style="opacity:0.7">The correct answer: <strong>${q.a}</strong></small>`;
        }

        updateScoreBar();
        document.getElementById('next-btn').style.display = 'block';
    }

    async function gradeWithAI(question, correctAnswer, userAnswer) {
        // First do a quick client-side check for obvious matches
        const ua = userAnswer.toLowerCase().trim();
        const ca = correctAnswer.toLowerCase().trim();
        if (ua === ca || ca.includes(ua) || ua.includes(ca)) return true;

        // Use Claude API to grade intelligently
        try {
            const prompt = `You are grading a film trivia game. Be generous but fair.

Question: "${question}"
Official answer: "${correctAnswer}"
Student answered: "${userAnswer}"

Is the student's answer correct or close enough to be considered correct? Consider partial answers, alternate phrasings, abbreviations, and common nicknames.

Reply with ONLY "yes" or "no".`;

            const response = await fetch("https://api.anthropic.com/v1/messages", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: "claude-sonnet-4-6",
                    max_tokens: 10,
                    messages: [{ role: "user", content: prompt }]
                })
            });

            const data = await response.json();
            if (data.content && data.content[0] && data.content[0].text) {
                return data.content[0].text.toLowerCase().includes('yes');
            }
        } catch (e) {
            // Fallback: simple string matching
            return ca.includes(ua) || ua.includes(ca.split(' ')[0]);
        }

        return false;
    }

    function showHint() {
        if (state.hintUsed) return;
        state.hintUsed = true;

        const a = state.currentQuestion.a;
        // Give first letter + length
        const hint = `Hint: Starts with "${a[0].toUpperCase()}", ${a.length} characters`;
        const hintEl = document.getElementById('hint-text');
        hintEl.textContent = hint;
        hintEl.style.display = 'block';
        document.getElementById('hint-btn').disabled = true;
    }

    function skipQuestion() {
        state.answered = true;
        state.streak = 0;
        const feedbackBox = document.getElementById('feedback-box');
        feedbackBox.className = 'incorrect';
        feedbackBox.innerHTML = `<span class="feedback-icon">⏭</span> <strong>Skipped.</strong> The answer was: <strong>${state.currentQuestion.a}</strong>`;
        document.getElementById('answer-input').disabled = true;
        document.getElementById('submit-btn').disabled = true;
        document.getElementById('hint-btn').disabled = true;
        document.getElementById('skip-btn').disabled = true;
        document.getElementById('next-btn').style.display = 'block';
        updateScoreBar();
    }

    function nextQuestion() {
        currentQuestionIndex++;
        state.questionNum++;

        if (state.questionNum > TOTAL_QUESTIONS) {
            showResults();
        } else {
            updateScoreBar();
            loadQuestion();
        }
    }

    function showResults() {
        document.getElementById('question-card').style.display = 'none';
        document.getElementById('answer-area').style.display = 'none';
        document.getElementById('feedback-box').style.display = 'none';
        document.getElementById('buttons-row').style.display = 'none';

        const panel = document.getElementById('results-panel');
        panel.style.display = 'block';
        document.getElementById('final-score-display').textContent = state.score;

        const pct = state.correctCount / TOTAL_QUESTIONS;
        let msg = '';
        if (pct === 1) msg = "🏆 Perfect score! You're a true cinephile!";
        else if (pct >= 0.8) msg = "🌟 Excellent work! You clearly love movies.";
        else if (pct >= 0.6) msg = "👍 Good effort! You know your films.";
        else if (pct >= 0.4) msg = "🎬 Not bad — keep watching more movies!";
        else msg = "📽 Time for a film marathon! You'll do better next time.";

        document.getElementById('final-message').textContent =
            `You got ${state.correctCount}/${TOTAL_QUESTIONS} correct. ${msg}`;
    }

    function restartGame() {
        startGame();
    }

    function updateScoreBar() {
        document.getElementById('display-score').textContent = state.score;
        document.getElementById('display-streak').textContent = state.streak + (state.streak >= 3 ? '🔥' : '');
        document.getElementById('display-question').textContent = `${Math.min(state.questionNum, TOTAL_QUESTIONS)}/${TOTAL_QUESTIONS}`;
        document.getElementById('display-correct').textContent = state.correctCount;
    }
</script>

</body>
</html>
